<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MedTech HOPT</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#F0F4F8;color:#1E293B;min-height:100vh}
:root{
  --navy:#0B2D5E;--navyM:#1A4A8A;--navyL:#EEF2FB;
  --teal:#006D6B;--tealM:#00A896;--tealL:#E3F4F3;
  --green:#065F46;--greenM:#059669;--greenL:#D1FAE5;
  --gold:#92400E;--goldM:#D97706;--goldL:#FEF3C7;
  --red:#B91C1C;--redM:#DC2626;--redL:#FEE2E2;
  --blue:#1E40AF;--blueM:#3B82F6;--blueL:#EFF6FF;
  --purp:#5B21B6;--purpM:#7C3AED;--purpL:#F5F3FF;
  --orange:#EA580C;--orangeL:#FFF7ED;
  --g1:#1E293B;--g3:#475569;--g5:#94A3B8;--g8:#E2E8F0;
  --white:#FFFFFF;--bg:#F8FAFC;
}
/* Layout */
.header{background:var(--navy);padding:0 24px;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.3)}
.header-inner{max-width:1400px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between}
#app{max-width:1400px;margin:0 auto;padding:20px 24px 60px}
/* Tabs */
.tabs{display:flex;gap:2px;background:white;border-radius:12px;padding:4px;margin-bottom:22px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow-x:auto}
.tab{flex:1;min-width:100px;padding:8px 6px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;color:var(--g5);font-family:inherit;transition:all .15s;white-space:nowrap;text-align:center}
.tab:hover{background:var(--navyL);color:var(--navy)}
.tab.active{background:var(--navy);color:white;font-weight:700}
/* Cards */
.card{background:white;border-radius:12px;padding:18px 20px;border:1px solid var(--g8);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-sm{background:white;border-radius:10px;padding:14px 16px;border:1px solid var(--g8)}
/* Grids */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g5c{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
/* Stats */
.stat{background:var(--bg);border-radius:10px;padding:14px 16px;border:1px solid var(--g8);text-align:center}
.stat-val{font-size:26px;font-weight:800;font-family:monospace}
.stat-lbl{font-size:10px;color:var(--g5);font-weight:600;letter-spacing:.5px;margin-bottom:3px}
.stat-sub{font-size:10px;color:var(--g5);margin-top:2px}
/* Progress */
.prog{height:7px;background:var(--g8);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .6s ease}
/* Buttons */
.btn-p{padding:9px 20px;background:var(--tealM);color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-p:hover{background:#008a7a}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-s{padding:6px 14px;border:1.5px solid var(--g8);border-radius:6px;background:white;font-size:11px;font-weight:600;cursor:pointer;color:var(--g3);font-family:inherit;transition:all .15s}
.btn-s:hover{background:var(--tealL);border-color:var(--tealM);color:var(--teal)}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
/* Status */
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
/* Input */
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--g8);border-radius:8px;font-size:13px;font-family:inherit;color:var(--g1);background:white;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--tealM)}
label{font-size:11px;font-weight:600;color:var(--g5);display:block;margin-bottom:4px;letter-spacing:.4px}
/* Modal */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:center;justify-content:center}
.modal{background:white;border-radius:16px;padding:28px;width:600px;max-width:94vw;box-shadow:0 24px 64px rgba(0,0,0,.3);max-height:88vh;overflow-y:auto}
/* Alerts */
.alert{padding:12px 16px;border-radius:9px;border:1px solid;margin-bottom:12px;font-size:12px;line-height:1.6}
.alert-g{background:var(--greenL);border-color:var(--greenM);color:var(--green)}
.alert-y{background:var(--goldL);border-color:var(--goldM);color:var(--gold)}
.alert-r{background:var(--redL);border-color:var(--redM);color:var(--red)}
.alert-b{background:var(--blueL);border-color:var(--blueM);color:var(--blue)}
/* Animations */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideright{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
.fadein{animation:fadein .3s ease}
.spin{animation:spin .7s linear infinite}
/* Tags */
.tag-g{font-size:10px;background:var(--greenL);color:var(--greenM);padding:2px 8px;border-radius:12px;font-weight:700;border:1px solid var(--greenM)40}
.tag-r{font-size:10px;background:var(--redL);color:var(--redM);padding:2px 8px;border-radius:12px;font-weight:700;border:1px solid var(--redM)40}
.tag-y{font-size:10px;background:var(--goldL);color:var(--goldM);padding:2px 8px;border-radius:12px;font-weight:700;border:1px solid var(--goldM)40}
.tag-b{font-size:10px;background:var(--blueL);color:var(--blueM);padding:2px 8px;border-radius:12px;font-weight:700;border:1px solid var(--blueM)40}
/* Table */
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{background:var(--navy);color:white;padding:9px 12px;text-align:left;font-weight:600;font-size:11px}
.data-table td{padding:9px 12px;border-bottom:1px solid #F1F5F9;vertical-align:top}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:nth-child(even) td{background:#FAFBFD}
/* Timeline */
.timeline{display:flex;gap:0;overflow-x:auto;padding-bottom:8px}
.tl-step{display:flex;flex-direction:column;align-items:center;flex:1;min-width:80px}
.tl-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;z-index:1;flex-shrink:0;position:relative}
.tl-line{flex:1;height:3px;margin-top:17px;align-self:flex-start}
.tl-label{font-size:10px;color:var(--g5);margin-top:6px;text-align:center;line-height:1.3}
/* ROI counter */
.roi-num{font-size:36px;font-weight:900;font-family:monospace;color:var(--greenM)}
/* Panes */
.pane{display:none}.pane.active{display:block}
/* Pre */
pre{font-size:10px;background:#0B2D5E;color:#A8EDEA;padding:14px;border-radius:8px;overflow:auto;max-height:220px;font-family:monospace;line-height:1.6}
@media(max-width:768px){.g2,.g3,.g4,.g5c{grid-template-columns:1fr}.timeline{flex-direction:column}}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:#0B2D5E;display:flex;align-items:center;justify-content:center;overflow:auto"></div>

<!-- MAIN APP (hidden until login) -->
<div id="main-app" style="display:none">

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:36px;height:36px;background:var(--tealM);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:900;color:white;font-size:16px;flex-shrink:0">S</div>
      <div>
        <div style="font-weight:800;font-size:16px;color:white;letter-spacing:-.3px">SIB</div>
        <div style="font-size:9px;color:var(--tealM);letter-spacing:2px;font-weight:700">HIS · LIS · PACS INTERCONNECTION BRIDGE · Copyright @Hoang Thuong</div>
      </div>
      <div style="margin-left:10px;padding:3px 11px;background:rgba(0,168,150,.15);border:1px solid rgba(0,168,150,.4);border-radius:20px;display:flex;align-items:center;gap:5px">
        <span style="width:7px;height:7px;border-radius:50%;background:var(--tealM);animation:pulse 1.4s infinite;display:inline-block"></span>
        <span style="font-size:10px;color:var(--tealM);font-weight:700">MVP DEMO</span>
      </div>
    </div>
    <div id="tab-header" style="display:flex;gap:3px"></div>
    <div style="font-size:11px;color:#8AAEC8;text-align:right">For Investors & BYT<br>Q1/2026 Demo</div>
  </div>
</div>

<div id="app">
  <div class="tabs" id="tabs-row"></div>
  <div id="pane-dashboard"  class="pane active"></div>
  <div id="pane-patients"   class="pane"></div>
  <div id="pane-reuse"      class="pane"></div>
  <div id="pane-lis"        class="pane"></div>
  <div id="pane-pacs"       class="pane"></div>
  <div id="pane-portal"     class="pane"></div>
  <div id="pane-security"   class="pane"></div>
  <div id="pane-rbac"       class="pane"></div>
  <div id="pane-roi"        class="pane"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="modal" style="display:none">
  <div class="modal" id="modal-body"></div>
</div>

<script>

// ══════════════════════════════════════════════════════════
// LOGIN SYSTEM — RBAC from first screen
// ══════════════════════════════════════════════════════════

let CURRENT_USER = null; // Active logged-in user

const LOGIN_USERS = {
  patient:      {role:"patient",      name:"Nguyễn Văn An",     id:"SIB-2024-001", bv:"",     credential:"001065012345", hint:"CCCD: 001065012345",  pin:"123456", patientId:"SIB-2024-001"},
  doctor_own:   {role:"doctor_own",   name:"BS. Trần Minh Hùng",id:"BS-BM-001",    bv:"bv_a", credential:"BS-HANOI-0451",hint:"Mã hành nghề",        pin:"654321"},
  doctor_other: {role:"doctor_other", name:"BS. Lê Thị Hoa",    id:"BS-VM-002",    bv:"bv_b", credential:"BS-HN-0892",   hint:"Mã hành nghề",        pin:"111222"},
  emergency_doc:{role:"emergency_doc",name:"BS. Vũ Minh Tuấn",  id:"BS-ER-003",    bv:"bv_d", credential:"ER-TOKEN-2024",hint:"Emergency token",     pin:"999000"},
  nurse:        {role:"nurse",        name:"ĐD. Nguyễn Thị Thu",id:"NU-BM-001",    bv:"bv_a", credential:"NU-BM-2024",   hint:"BV credential",       pin:"246810"},
  bv_manager:   {role:"bv_manager",   name:"TS. Nguyễn Bá Hoàng",id:"MGR-BM-001", bv:"bv_a", credential:"ADMIN-BM-001", hint:"Admin credential",    pin:"135790"},
  researcher:   {role:"researcher",   name:"GS. Phạm Thị Lan",  id:"RES-YHN-001", bv:"",     credential:"IRB-2024-055",  hint:"IRB token",           pin:"777888"},
  sib_admin:    {role:"sib_admin",    name:"KS. Trần Đức Anh",  id:"SIB-ADM-001", bv:"",     credential:"HEALTHV-ADM",  hint:"Hardware key ID",     pin:"000111"},
  pharmacist:   {role:"pharmacist",   name:"DS. Lê Hoàng Minh", id:"PH-BM-001",   bv:"bv_a", credential:"PH-BM-2024",   hint:"Dược sĩ license",     pin:"369147"},
};

const LOGIN_ROLE_INFO = {
  patient:       {label:"Người bệnh",          icon:"👤", col:"#7C3AED", bg:"#F5F3FF", authSteps:["Nhập CCCD / BHYT","Xác thực khuôn mặt (eKYC)","Nhập OTP SMS"]},
  doctor_own:    {label:"Bác sĩ (BV của mình)",icon:"👨‍⚕️",col:"#059669", bg:"#D1FAE5", authSteps:["Mã hành nghề BYT","BV Credential","MFA (TOTP)"]},
  doctor_other:  {label:"Bác sĩ (BV khác)",    icon:"👨‍⚕️",col:"#0EA5E9", bg:"#EFF6FF", authSteps:["Mã hành nghề BYT","BV Credential","MFA (TOTP)"]},
  emergency_doc: {label:"Bác sĩ Cấp cứu",      icon:"🚨", col:"#DC2626", bg:"#FEE2E2", authSteps:["Emergency Token","Dual Authorization","Break-glass confirm"]},
  nurse:         {label:"Điều dưỡng",           icon:"👩‍⚕️",col:"#D97706", bg:"#FEF3C7", authSteps:["BV Credential","MFA (TOTP)"]},
  bv_manager:    {label:"Quản lý BV",           icon:"📊", col:"#1A4A8A", bg:"#EEF2FB", authSteps:["Admin Credential","Hardware Key (YubiKey)"]},
  researcher:    {label:"Nghiên cứu viên",      icon:"🔬", col:"#7C3AED", bg:"#F5F3FF", authSteps:["Institution Account","IRB Token","Research PIN"]},
  sib_admin:     {label:"SIB Admin (HealthV)",  icon:"⚙️", col:"#475569", bg:"#F1F5F9", authSteps:["Hardware Key","Dual Admin Auth","VPN + PIN"]},
  pharmacist:    {label:"Dược sĩ",              icon:"💊", col:"#EA580C", bg:"#FFF7ED", authSteps:["Dược sĩ License","BV Credential","MFA"]},
};

// Which tabs each role can see
const ROLE_TABS = {
  patient:       ["dashboard","portal","security"],
  doctor_own:    ["dashboard","patients","reuse","lis","pacs","security","roi"],
  doctor_other:  ["dashboard","patients","reuse","lis","pacs","security"],
  emergency_doc: ["dashboard","patients","reuse","lis","pacs","security"],
  nurse:         ["dashboard","patients","lis","security"],
  bv_manager:    ["dashboard","security","roi"],
  researcher:    ["dashboard","security"],
  sib_admin:     ["dashboard","security","roi"],
  pharmacist:    ["dashboard","patients","lis","security"],
};

// Tab labels (full set)
const ALL_TAB_LABELS = {
  dashboard:"📊 Dashboard", patients:"👤 Patient MPI", reuse:"⚡ Smart Reuse",
  lis:"🧪 LIS Results", pacs:"🩻 PACS Imaging", portal:"🏠 Hồ sơ của tôi",
  security:"🔒 Bảo mật", roi:"💰 ROI & Đầu tư",
};

let LOGIN_STATE = {step:1, selectedRole:null, credVal:"", pinVal:"", ekycDone:false, otpVal:"", loading:false};

function renderLoginScreen(){
  const el = document.getElementById('login-screen');
  if(!el) return;
  const ls = LOGIN_STATE;

  if(ls.loading){
    el.innerHTML = `
    <div style="text-align:center;color:white">
      <div style="width:56px;height:56px;border:4px solid rgba(255,255,255,.2);border-top-color:var(--tealM);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px"></div>
      <div style="font-size:18px;font-weight:700">Đang xác thực...</div>
      <div style="font-size:13px;color:#8AAEC8;margin-top:6px">Kiểm tra quyền truy cập SIB</div>
    </div>`;
    return;
  }

  if(ls.step===1){
    // STEP 1: Choose role
    el.innerHTML = `
    <div style="width:100%;max-width:780px;padding:24px">
      <div style="text-align:center;margin-bottom:28px">
        <div style="display:inline-flex;align-items:center;gap:12px;margin-bottom:16px">
          <div style="width:44px;height:44px;background:var(--tealM);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;color:white;font-size:20px">S</div>
          <div style="text-align:left">
            <div style="font-size:22px;font-weight:900;color:white;letter-spacing:-.5px">MedTech HOPT</div>
            <div style="font-size:10px;color:var(--tealM);letter-spacing:2px;font-weight:700">Copyright @Hoang Thuong</div>
          </div>
        </div>
        <div style="font-size:15px;font-weight:600;color:white;margin-bottom:4px">Chọn vai trò để đăng nhập</div>
        <div style="font-size:12px;color:#8AAEC8">Mỗi vai trò có quyền hạn và giao diện riêng · Zero-trust access control</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
        ${Object.entries(LOGIN_ROLE_INFO).map(([k,r])=>{
          const usr = LOGIN_USERS[k];
          const sel = ls.selectedRole===k;
          return `
          <div onclick="selectLoginRole('${k}')" style="background:${sel?r.bg:'rgba(255,255,255,.07)'};border:2px solid ${sel?r.col:'rgba(255,255,255,.15)'};border-radius:12px;padding:14px;cursor:pointer;transition:all .15s">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <span style="font-size:20px">${r.icon}</span>
              <span style="font-size:12px;font-weight:700;color:${sel?r.col:'white'}">${r.label}</span>
            </div>
            <div style="font-size:10px;color:${sel?r.col+'CC':'rgba(255,255,255,.5)'};margin-bottom:6px">${usr.name}</div>
            <div style="display:flex;gap:3px;flex-wrap:wrap">
              ${r.authSteps.map(s=>`<span style="font-size:9px;background:${sel?r.col+'20':'rgba(255,255,255,.1)'};color:${sel?r.col:'rgba(255,255,255,.6)'};padding:1px 6px;border-radius:8px">${s}</span>`).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>
      <div style="text-align:center;margin-top:20px">
        <button onclick="goLoginStep2()" style="padding:12px 40px;background:${ls.selectedRole?'var(--tealM)':'rgba(255,255,255,.2)'};color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:${ls.selectedRole?'pointer':'not-allowed'};font-family:inherit;transition:all .2s">
          Tiếp tục →
        </button>
      </div>
    </div>`;
    return;
  }

  if(ls.step===2){
    // STEP 2: Enter credentials
    const rkey = ls.selectedRole;
    const ri = LOGIN_ROLE_INFO[rkey];
    const usr = LOGIN_USERS[rkey];
    const isPatient = rkey==='patient';
    const isEmergency = rkey==='emergency_doc';

    el.innerHTML = `
    <div style="width:100%;max-width:460px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:28px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
        <button onclick="LOGIN_STATE.step=1;renderLoginScreen()" style="background:rgba(255,255,255,.1);border:none;color:white;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:14px">←</button>
        <div style="flex:1;text-align:center">
          <div style="font-size:22px">${ri.icon}</div>
          <div style="font-size:14px;font-weight:700;color:${ri.col}">${ri.label}</div>
          <div style="font-size:11px;color:#8AAEC8">${usr.name}</div>
        </div>
        <div style="width:32px"></div>
      </div>

      ${isPatient?`
      <!-- Patient: CCCD + eKYC + OTP -->
      <div style="margin-bottom:14px">
        <div style="font-size:11px;font-weight:600;color:#8AAEC8;margin-bottom:5px">SỐ CCCD / BHYT</div>
        <input type="text" id="cred-input" value="${usr.credential}" placeholder="${usr.hint}"
          style="width:100%;padding:10px 14px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:8px;font-size:14px;color:white;font-family:inherit;outline:none">
      </div>
      <div style="margin-bottom:14px;padding:12px;background:${ls.ekycDone?'rgba(5,150,105,.2)':'rgba(255,255,255,.07)'};border:1px solid ${ls.ekycDone?'#059669':'rgba(255,255,255,.1)'};border-radius:8px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:12px;font-weight:600;color:${ls.ekycDone?'#34D399':'#8AAEC8'}">📷 Xác thực khuôn mặt (eKYC)</div>
            <div style="font-size:10px;color:${ls.ekycDone?'#34D399':'#8AAEC8'}">${ls.ekycDone?'✅ Đã xác thực':'Nhấn để mô phỏng'}</div>
          </div>
          ${ls.ekycDone?'<span style="font-size:20px">✅</span>':`<button onclick="simulateEKYC()" style="padding:5px 12px;background:var(--tealM);border:none;border-radius:6px;color:white;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">Scan</button>`}
        </div>
      </div>
      <div style="margin-bottom:14px">
        <div style="font-size:11px;font-weight:600;color:#8AAEC8;margin-bottom:5px">OTP SMS (6 số) <span style="color:#475569">· Demo: nhập bất kỳ 6 số</span></div>
        <input type="text" id="otp-input" maxlength="6" value="${ls.otpVal}" oninput="LOGIN_STATE.otpVal=this.value" placeholder="------"
          style="width:100%;padding:10px 14px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:8px;font-size:20px;color:white;font-family:monospace;text-align:center;letter-spacing:8px;outline:none">
      </div>`:`
      <!-- Other roles: credential + PIN -->
      <div style="margin-bottom:14px">

function selectLoginRole(k){
  LOGIN_STATE.selectedRole=k;

}

function goLoginStep2(){
  if(!LOGIN_STATE.selectedRole) return;
  LOGIN_STATE.step=2;
  renderLoginScreen();
}

function simulateEKYC(){
  const el=document.getElementById('login-screen');
  if(el){
    const btn=el.querySelector('button[onclick="simulateEKYC()"]');
    if(btn){btn.textContent='Scanning...';btn.disabled=true;}
  }
  setTimeout(()=>{LOGIN_STATE.ekycDone=true;renderLoginScreen();},1400);
}

function doLogin(){
  const rkey=LOGIN_STATE.selectedRole;
  const usr=LOGIN_USERS[rkey];
  const isPatient=rkey==='patient';
  const errEl=document.getElementById('login-error');

  // Validate
  const credEl=document.getElementById('cred-input');
  const cred=credEl?credEl.value.trim():'';

  if(isPatient){
    if(!LOGIN_STATE.ekycDone){
      if(errEl){errEl.style.display='block';errEl.textContent='⚠ Vui lòng hoàn tất xác thực khuôn mặt (eKYC)';}
      return;
    }
    const otp=document.getElementById('otp-input')?.value||'';
    if(otp.length<4){
      if(errEl){errEl.style.display='block';errEl.textContent='⚠ Vui lòng nhập mã OTP 6 số';}
      return;
    }
    if(cred!==usr.credential){
      if(errEl){errEl.style.display='block';errEl.textContent='⚠ CCCD không đúng. Demo: '+usr.credential;}
      return;
    }
  } else {
    const pin=document.getElementById('pin-input')?.value||'';
    if(pin!==usr.pin){
      if(errEl){errEl.style.display='block';errEl.textContent='⚠ PIN không đúng. Demo PIN: '+usr.pin;}
      return;
    }
  }

  // Auth success → loading
  LOGIN_STATE.loading=true;
  renderLoginScreen();

  setTimeout(()=>{
    CURRENT_USER = {...usr};
    // Show app
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-app').style.display='block';
    // Show notification for emergency
    if(rkey==='emergency_doc'){
      setTimeout(()=>showBreakGlassAlert(),400);
    }
    // Init app with role
    initAppForRole(CURRENT_USER);
  }, 1800);
}

// Override switchTab to check permissions
const _origSwitchTab = typeof switchTab==='function'?switchTab:null;
function switchTab(id){
  if(CURRENT_USER){
    const allowed=ROLE_TABS[CURRENT_USER.role]||['dashboard'];
    if(!allowed.includes(id)){
      showAccessDenied(id);
      return;
    }
  }
  S.tab=id;
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+id)?.classList.add('active');
  // Update tab active state
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('active',t.textContent.trim()===ALL_TAB_LABELS[id]);
  });
  renderPane(id);
}

function showAccessDenied(tabId){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;top:80px;right:20px;z-index:999;background:#1A4A8A;color:white;padding:14px 18px;border-radius:12px;font-size:12px;box-shadow:0 4px 24px rgba(0,0,0,.3);max-width:300px;animation:fadein .3s ease';

  setTimeout(()=>overlay.remove(),3500);
}

function dqC(s){return s>=80?"#059669":s>=60?"#D97706":s>=40?"#EA580C":"#DC2626"}
function statusC(s){return s==="connected"?"#059669":s==="partial"?"#D97706":"#94A3B8"}

function getPt(id){return PATIENTS.find(p=>p.id===id)}
function fmtCost(n){return (n/1000000).toFixed(1)+"M VND"}
function validTag(status){
  return status==="valid"
    ?`<span class="tag-g">✓ Còn hạn</span>`
    :`<span class="tag-r">✗ Hết hạn</span>`;
}
function daysLeft(rule,daysAgo){return rule-daysAgo}
function prg(val,col,h=7){return `<div class="prog" style="height:${h}px"><div class="prog-fill" style="width:${Math.min(100,Math.max(0,val))}%;background:${col}"></div></div>`}
function bdg(l,c){return `<span class="badge" style="color:${c};background:${c}18;border:1px solid ${c}40">${l}</span>`}

}

function renderReuseResult(pt){
  const validLabs=pt.labs.filter(l=>l.status==="valid");
  const expiredLabs=pt.labs.filter(l=>l.status==="expired");
  const validImg=pt.imaging.filter(i=>i.status==="valid");
  const expiredImg=pt.imaging.filter(i=>i.status==="expired");
  const savings = (validLabs.length+validImg.length)*350000;
  return `
<div class="alert-g alert">✅ Tìm thấy hồ sơ bệnh nhân: <strong>${pt.name}</strong> · CCCD: ${pt.cccd} · BV gốc: ${getBV(pt.bvGoc).name} · SIB ID: ${pt.id}</div>
${pt.allergies.length?`<div class="alert-r alert">⚠ CẢNH BÁO DỊ ỨNG: ${pt.allergies.join(", ")}</div>`:""}
<div class="alert-b alert">ℹ Consent Tier ${pt.consentTier}/3: Bệnh nhân đã đồng ý chia sẻ data cho mục đích điều trị (Tier 1). Đọc kết quả này phù hợp.</div>

<div class="g2" style="margin-bottom:14px">
<div class="card" style="border-color:var(--greenM);border-width:2px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div style="font-size:13px;font-weight:700;color:var(--greenM)">✅ Kết quả XN còn giá trị — CÓ THỂ DÙNG LẠI</div>
    <span class="tag-g">${validLabs.length} mục</span>
  </div>
  ${validLabs.map(l=>{
    const remain=daysLeft(l.validity,l.daysAgo);
    return `<div style="padding:8px 0;border-bottom:1px solid var(--g8)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px">
        <div>
          <span style="font-size:12px;font-weight:600">${l.name}</span>
          <span style="font-size:10px;color:var(--g5);margin-left:6px">LOINC: ${l.loinc}</span>
        </div>
        <span class="tag-g">Còn ${remain} ngày</span>
      </div>
      <div style="display:flex;gap:10px;font-size:11px;color:var(--g3)">
        <span>📅 ${l.date} tại ${getBV(l.bv).short}</span>
        <span style="font-weight:600;color:var(--greenM)">Kết quả: ${l.result}</span>
      </div>
    </div>`;
  }).join("")}
  <div style="margin-top:10px;padding:8px 12px;background:var(--greenL);border-radius:8px;font-size:11px;color:var(--green);font-weight:500">
    💡 Tiết kiệm ước tính: ~${fmtCost(savings)} và ~${(validLabs.length+validImg.length)*0.5}h chờ đợi nếu không làm lại các kết quả này
  </div>
</div>
<div class="card" style="border-color:var(--redM);border-width:2px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div style="font-size:13px;font-weight:700;color:var(--redM)">🔄 Kết quả đã hết hạn — CẦN LÀM LẠI</div>
    <span class="tag-r">${expiredLabs.length+expiredImg.length} mục</span>
  </div>
  ${[...expiredLabs,...expiredImg].map(l=>`
  <div style="padding:8px 0;border-bottom:1px solid var(--g8)">
    <div style="display:flex;justify-content:space-between;margin-bottom:3px">
      <span style="font-size:12px;font-weight:600">${l.name}</span>
      <span class="tag-r">Hết hạn ${l.daysAgo-l.validity} ngày trước</span>
    </div>
    <div style="font-size:11px;color:var(--g5)">📅 ${l.date} tại ${getBV(l.bv).short} · Hiệu lực: ${l.validity} ${l.unit}</div>
  </div>`).join("")}
</div>
</div>

<!-- Imaging valid -->
${validImg.length?`
<div class="card" style="margin-bottom:14px;border-color:var(--purpM);border-width:2px">
  <div style="font-size:13px;font-weight:700;color:var(--purpM);margin-bottom:12px">🩻 Ảnh chẩn đoán còn giá trị</div>
  <table class="data-table">
    <thead><tr><th>Loại chụp chiếu</th><th>Ngày chụp</th><th>BV</th><th>Kết quả</th><th>Còn hạn</th><th>Kích thước</th></tr></thead>
    <tbody>
    ${validImg.map(i=>`<tr>
      <td><strong>${i.name}</strong><br><span style="font-size:10px;color:var(--g5)">${i.modality}</span></td>
      <td>${i.date}</td><td>${getBV(i.bv).short}</td>
      <td style="font-size:11px">${i.finding.slice(0,60)}...</td>
      <td><span class="tag-g">Còn ${daysLeft(i.validity,i.daysAgo)} ngày</span></td>
      <td style="font-size:11px;color:var(--g5)">${i.size}</td>
    </tr>`).join("")}
    </tbody>
  </table>
</div>`:""}`;}

function renderPACS(){
  const pt=S.selectedPt?getPt(S.selectedPt):PATIENTS[0];
  const modalityColors={"CR":"#7C3AED","CT":"#DC2626","US":"#059669","ECG":"#D97706","MRI":"#0EA5E9"};
  return `<div class="fadein">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
  <div>
    <h2 style="font-size:18px;font-weight:800;color:var(--navy);margin-bottom:3px">🩻 PACS — Chẩn đoán Hình ảnh</h2>
    <p style="font-size:12px;color:var(--g5)">DICOM 3.0 · WADO-RS · FHIR ImagingStudy · Smart Reuse cho ảnh chẩn đoán</p>
  </div>
  <select onchange="selectPACSPt(this.value)" style="width:220px">
    ${PATIENTS.map(p=>`<option value="${p.id}"${(pt&&pt.id===p.id)?" selected":""}>${p.name}</option>`).join("")}
  </select>
</div>
${pt?`
<div class="g2" style="margin-bottom:14px">
  <div class="stat"><div class="stat-lbl">IMAGING STUDIES</div><div class="stat-val" style="color:var(--purpM)">${pt.imaging.length}</div><div class="stat-sub">từ ${new Set(pt.imaging.map(i=>i.bv)).size} BV</div></div>
  <div class="stat"><div class="stat-lbl">CÒN GIÁ TRỊ</div><div class="stat-val" style="color:var(--greenM)">${pt.imaging.filter(i=>i.status==="valid").length}</div><div class="stat-sub">không cần chụp lại</div></div>
</div>
<div style="display:grid;gap:12px">
${pt.imaging.map(img=>{
  const col=modalityColors[img.modality]||"#475569";
  const bv=getBV(img.bv);
  const remain=daysLeft(img.validity,img.daysAgo);
  return `
  <div class="card" style="border-left:4px solid ${col}">
    <div style="display:flex;gap:14px;align-items:flex-start">
      <!-- Modality icon -->
      <div style="width:64px;height:64px;border-radius:10px;background:${col}18;border:1.5px solid ${col}40;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
        <div style="font-size:18px">🩻</div>
        <div style="font-size:9px;font-weight:800;color:${col}">${img.modality}</div>
      </div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <div style="font-size:13px;font-weight:700">${img.name}</div>
          ${img.status==="valid"?`<span class="tag-g">✓ Còn ${remain} ngày</span>`:`<span class="tag-r">✗ Hết hạn</span>`}
        </div>
        <div style="display:flex;gap:10px;font-size:11px;color:var(--g5);margin-bottom:6px">
          <span>📅 ${img.date}</span>
          <span>${bdg(bv.short,"#1A4A8A")}</span>
          <span>💾 ${img.size}</span>
          <span>Hiệu lực: ${img.validity} ${img.unit}</span>
        </div>
        <div style="font-size:11px;color:var(--g1);background:var(--bg);padding:8px 10px;border-radius:7px;line-height:1.5;font-style:italic">"${img.finding}"</div>
        ${img.status==="valid"?`
        <div style="margin-top:8px;display:flex;gap:6px">
          <button class="btn-s" onclick="showDICOMPreview('${img.id}','${pt.id}')">📋 DICOM Metadata</button>
          <button class="btn-s" style="background:var(--purpL);border-color:var(--purpM);color:var(--purpM)" onclick="alert('Demo: Mở ảnh DICOM từ PACS ${bv.name} qua WADO-RS')">🩻 Xem ảnh (WADO-RS)</button>
        </div>`:`
        <div class="alert-y alert" style="margin-top:8px;padding:6px 10px">⏰ Kết quả đã hết hạn ${Math.abs(remain)} ngày. Xem xét chụp lại.</div>`}
      </div>
    </div>
  </div>`;
}).join("")}
</div>`:""} </div>`;
}

function permIcon(val){
  if(val===true) return '<span style="color:#059669;font-size:14px">✅</span>';
  if(val===false) return '<span style="color:#DC2626;font-size:14px">✗</span>';
  if(val==="consent_only") return '<span style="color:#D97706;font-size:13px" title="Chỉ khi có consent Tier 1">🔐</span>';
  if(val==="break_glass") return '<span style="color:#DC2626;font-size:13px" title="Break-glass — audit ngay">🚨</span>';
  if(val==="limited"||val==="vitals_only"||val==="meds_only"||val==="meds_allergies_only"||val==="relevant_labs"||val==="dispense_only") return '<span style="color:#D97706;font-size:13px" title="Giới hạn phạm vi">⚠</span>';
  if(typeof val==="string") return '<span style="color:#7C3AED;font-size:13px" title="'+val+'">◈</span>';
  return '<span style="color:#94A3B8">—</span>';
}

function runReuse(){
  const cccdEl=document.getElementById("reuse-cccd");
  const cccd=(cccdEl?cccdEl.value:"").trim();
  if(!cccd){alert("Vui lòng nhập CCCD hoặc BHYT");return;}
  const pt=PATIENTS.find(p=>p.cccd===cccd||p.bhyt===cccd||p.id===cccd);
  if(!pt){alert("Không tìm thấy bệnh nhân. Thử: 001065012345 (Nguyễn Văn An)");return;}
  S.reuseLoading=true;S.reuseResult=null;renderPane("reuse");
  setTimeout(()=>{S.reuseLoading=false;S.reuseResult=pt;renderPane("reuse");},1500);
}

function updateROI(){
  const bv=+document.getElementById("roi-bv").value;
  const pts=+document.getElementById("roi-pts").value;
  const pct=+document.getElementById("roi-pct").value;
  const cost=+document.getElementById("roi-cost").value;
  document.getElementById("roi-bv-val").textContent=bv+" BV";
  document.getElementById("roi-pts-val").textContent=pts+" BN";
  document.getElementById("roi-pct-val").textContent=pct+"%";
  document.getElementById("roi-cost-val").textContent=(cost/1000).toFixed(0)+"K VND";
  const daily=bv*pts*(pct/100)*cost*0.3; // 30% XN tránh được
  const monthly=daily*22;
  const annual=monthly*12;
  document.getElementById("roi-daily").textContent=(daily/1000000).toFixed(1)+"M";
  document.getElementById("roi-monthly").textContent=(monthly/1000000).toFixed(0)+"M";
  document.getElementById("roi-annual").textContent=annual>=1000000000?(annual/1000000000).toFixed(1)+"B":(annual/1000000).toFixed(0)+"M";
}

         </div>`,
      2:`<div style="text-align:center;padding:20px">
          <div style="width:40px;height:40px;border:4px solid var(--g8);border-top-color:var(--tealM);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px"></div>
          <p style="font-size:13px;font-weight:600;color:var(--navy)">Kiểm tra kết nối...</p>
          ${["✓ Ping OK","✓ Read-only access","✓ Schema detected","✓ LIS HL7 v2.5 found","✓ PACS DICOM found"].map(s=>`<p style="font-size:11px;color:var(--greenM);margin-top:4px">${s}</p>`).join("")}
         </div>`,
      3:`<div style="text-align:center;padding:20px"><div style="font-size:48px;margin-bottom:12px">🎉</div><div style="font-size:16px;font-weight:800;color:var(--greenM)">Kết nối thành công!</div><p style="font-size:12px;color:var(--g3);margin-top:6px">BV đã được thêm vào SIB. Sync sẽ bắt đầu trong 15 phút.</p></div>`,
    };
    document.getElementById('modal-body').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <div><div style="font-size:16px;font-weight:800;color:var(--navy)">Kết nối BV mới</div><div style="font-size:11px;color:var(--g5)">Không yêu cầu thay đổi HIS/LIS/PACS</div></div>
      <button onclick="document.getElementById('modal').style.display='none'" style="background:none;border:none;font-size:22px;color:var(--g5);cursor:pointer">×</button>
    </div>
    <div style="display:flex;margin-bottom:18px">${steps.map((s,i)=>`<div style="flex:1;text-align:center"><div style="width:28px;height:28px;border-radius:50%;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:${i<=step?"var(--tealM)":"var(--g8)"};color:${i<=step?"white":"var(--g5)"}">${i+1}</div><div style="font-size:9px;color:${i<=step?"var(--tealM)":"var(--g5)"}">${s}</div></div>`).join("")}</div>
    ${bodies[step]||""}
    <div style="display:flex;gap:8px;margin-top:20px;justify-content:flex-end">
      ${step>0&&step<3?`<button class="btn-s" onclick="window._step=${step-1};renderM()">← Quay lại</button>`:""}
      ${step<3?`<button class="btn-p" onclick="${step===2?"window._step=3;renderM()":"window._step="+(step+1)+";renderM()"}">${step===2?"Xác nhận":"Tiếp tục →"}</button>`:""}
      ${step===3?`<button class="btn-p" onclick="document.getElementById('modal').style.display='none'">Hoàn tất ✓</button>`:""}
    </div>`;
    if(step===2)setTimeout(()=>{step=3;renderM();},2200);
  }
  window._step=0;
  Object.defineProperty(window,'_step',{set(v){step=v},get(){return step}});
  window.renderM=renderM;
  document.getElementById('modal').style.display='flex';
  renderM();
}

function showDICOMPreview(imgId,ptId){
  const pt=getPt(ptId);
  const img=pt?pt.imaging.find(i=>i.id===imgId):null;
  if(!img)return;
  const bv=getBV(img.bv);
  document.getElementById('modal-body').innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div><div style="font-size:15px;font-weight:700;color:var(--navy)">DICOM Metadata · FHIR ImagingStudy</div></div>
    <button onclick="document.getElementById('modal').style.display='none'" style="background:none;border:none;font-size:22px;color:var(--g5);cursor:pointer">×</button>
  </div>
  <div style="display:flex;gap:5px;margin-bottom:8px">
    ${bdg("200 OK","#059669")} ${bdg("GET /fhir/r4/ImagingStudy/"+img.id,"#0B2D5E")} ${bdg("DICOM 3.0","#7C3AED")}
  </div>
  <pre>${JSON.stringify({
    resourceType:"ImagingStudy",id:img.id,status:"available",
    subject:{reference:"Patient/"+ptId},
    started:img.date+"T08:30:00+07:00",
    location:{display:bv.name},
    series:[{number:1,modality:{code:img.modality,system:"http://dicom.nema.org/resources/ontology/DCM"},
      description:img.name,
      endpoint:[{reference:"wado://"+bv.id+"/wado?studyUID="+img.id}]}],
    extension:[
      {url:"https://healthv.vn/fhir/ext/validity-days",valueInteger:img.validity},
      {url:"https://healthv.vn/fhir/ext/reuse-status",valueString:img.status},
      {url:"https://healthv.vn/fhir/ext/finding",valueString:img.finding},
      {url:"https://healthv.vn/fhir/ext/file-size",valueString:img.size},
    ]
  },null,2)}</pre>
  <button onclick="document.getElementById('modal').style.display='none'" class="btn-p" style="margin-top:10px;width:100%">Đóng</button>`;
  document.getElementById('modal').style.display='flex';
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});

function init(){
  // Hide app, show login
  const app = document.getElementById('main-app');
  if(app) app.style.display='none';
  renderLoginScreen();
}
document.addEventListener('DOMContentLoaded',init);
</script>
