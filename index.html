<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIS Bridge — HealthV MedTech MVP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#F0F4F8;color:#1E293B;min-height:100vh}
:root{
  --navy:#0B2D5E;--navyM:#1A4A8A;--navyL:#EEF2FB;
  --teal:#006D6B;--tealM:#00A896;--tealL:#E3F4F3;
  --green:#065F46;--greenM:#059669;--greenL:#D1FAE5;
  --gold:#92400E;--goldM:#D97706;--goldL:#FEF3C7;
  --red:#B91C1C;--redM:#DC2626;--redL:#FEE2E2;
  --blue:#1E40AF;--blueM:#3B82F6;--blueL:#EFF6FF;
  --purp:#5B21B6;--purpM:#7C3AED;--purpL:#F5F3FF;
  --coral:#EA580C;
  --g1:#1E293B;--g3:#475569;--g5:#94A3B8;--g8:#E2E8F0;
  --white:#FFFFFF;--bg:#F8FAFC;
}
.header{background:var(--navy);padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.header-inner{max-width:1280px;margin:0 auto;height:54px;display:flex;align-items:center;justify-content:space-between}
.logo-icon{width:34px;height:34px;background:var(--tealM);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:900;color:white;font-size:16px;flex-shrink:0}
.logo-name{font-weight:800;font-size:17px;color:white}
.logo-sub{font-size:9px;color:var(--tealM);letter-spacing:2px;font-weight:700}
.live-badge{display:flex;align-items:center;gap:5px;padding:3px 11px;background:rgba(0,168,150,.15);border:1px solid rgba(0,168,150,.4);border-radius:20px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--tealM);animation:pulse 1.4s infinite}
#app{max-width:1280px;margin:0 auto;padding:20px 24px 48px}
/* TABS */
.tabs{display:flex;gap:2px;background:white;border-radius:12px;padding:4px;margin-bottom:22px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.tab{flex:1;padding:9px 4px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;color:var(--g5);font-family:inherit;transition:all .15s;white-space:nowrap}
.tab:hover{background:var(--navyL);color:var(--navy)}
.tab.active{background:var(--navy);color:white;font-weight:700}
/* CARDS */
.card{background:white;border-radius:12px;padding:20px;border:1px solid var(--g8);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:14px}
/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg);border-radius:10px;padding:14px 16px;border:1px solid var(--g8);text-align:center}
.stat-label{font-size:10px;color:var(--g5);font-weight:600;letter-spacing:.5px;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:800;font-family:monospace}
.stat-sub{font-size:10px;color:var(--g5);margin-top:2px}
/* PROGRESS */
.progress{height:7px;background:var(--g8);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .6s ease}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
/* BUTTONS */
.btn-primary{padding:9px 20px;background:var(--tealM);color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary:hover{background:#008a7a}
.btn-sm{padding:5px 12px;border:1.5px solid var(--g8);border-radius:6px;background:white;font-size:11px;font-weight:600;cursor:pointer;color:var(--g3);font-family:inherit;transition:all .15s}
.btn-sm:hover{background:var(--tealL);border-color:var(--tealM);color:var(--teal)}
/* HIS ROW */
.his-row{display:grid;grid-template-columns:22px 1fr 130px 120px 90px 120px 20px;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid #F1F5F9;cursor:pointer;transition:background .1s}
.his-row:last-child{border-bottom:none}
.his-row:hover{background:#FAFBFD}
/* STATUS DOT */
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:white;border-radius:16px;padding:28px;width:520px;max-width:92vw;box-shadow:0 24px 64px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto}
/* STEP indicator */
.step-wrap{display:flex;margin-bottom:22px}
.step-item{flex:1;text-align:center}
.step-circle{width:28px;height:28px;border-radius:50%;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .3s}
/* FORM */
input[type=text],input[type=password],select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--g8);border-radius:8px;font-size:13px;font-family:inherit;color:var(--g1);background:white;outline:none;transition:border .15s}
input:focus,select:focus{border-color:var(--tealM)}
label{font-size:11px;font-weight:600;color:var(--g5);display:block;margin-bottom:5px;letter-spacing:.4px}
/* PRE */
pre{font-size:10px;background:#0B2D5E;color:#A8EDEA;padding:14px;border-radius:8px;overflow:auto;max-height:260px;font-family:monospace;line-height:1.6}
/* ARCH DIAGRAM */
.arch-node{padding:8px 12px;border-radius:8px;border:1.5px solid;font-size:10px;font-weight:600;text-align:center;white-space:nowrap}
/* ANIMATIONS */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadein{animation:fadein .25s ease}
.spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g5c{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
/* PANE */
.pane{display:none}.pane.active{display:block}
/* Expandable row detail */
.row-detail{background:#F8FAFC;border:1.5px solid var(--tealM);border-top:none;border-radius:0 0 10px 10px;padding:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;animation:fadein .2s ease}
/* Patient card */
.pt-card{cursor:pointer;transition:all .15s}
.pt-card:hover .pt-header{background:var(--navyL)}
.pt-header{background:var(--bg);border-radius:10px;padding:12px 16px;border:1.5px solid var(--g8);transition:all .15s}
.pt-header.selected{border-color:var(--tealM);background:var(--tealL)}
.pt-detail{border:1.5px solid var(--tealM);border-top:none;border-radius:0 0 10px 10px;padding:14px;background:#FAFFFE;animation:fadein .2s ease}
/* DQ */
.dq-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
/* Pricing */
.price-card{border-radius:14px;padding:22px;position:relative;transition:transform .15s}
.price-card:hover{transform:translateY(-2px)}
/* Arch flow */
.arch-flow{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding-bottom:8px}
.arch-col{display:flex;flex-direction:column;gap:6px;min-width:130px;justify-content:center}
.arch-arrow{display:flex;align-items:center;padding:0 10px;font-size:22px;color:var(--g8);flex-shrink:0}
.arch-box{padding:20px 16px;border-radius:12px;flex-shrink:0;min-width:160px}
/* Responsive */
@media(max-width:768px){.g2,.g3,.g4,.g5c{grid-template-columns:1fr}.stat-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="logo-icon">H</div>
      <div>
        <div class="logo-name">HIS Bridge</div>
        <div class="logo-sub">SYSTEM INTERCONNECTION · Copyright @2026 by Hoang Thuong</div>
      </div>
      <div class="live-badge" style="margin-left:12px">
        <div class="live-dot"></div>
        <span style="font-size:10px;color:var(--tealM);font-weight:700">MVP v0.1</span>
      </div>
    </div>
    <div style="display:flex;gap:4px" id="tab-bar"></div>
    <div style="font-size:11px;color:#8AAEC8">Demo · Q1/2026</div>
  </div>
</div>

<div id="app">
  <div class="tabs" id="tabs-row"></div>
  <div id="pane-dashboard" class="pane active"></div>
  <div id="pane-his" class="pane"></div>
  <div id="pane-mpi" class="pane"></div>
  <div id="pane-dq" class="pane"></div>
  <div id="pane-api" class="pane"></div>
  <div id="pane-pricing" class="pane"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="connect-modal" style="display:none">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <div>
        <div style="font-size:16px;font-weight:800;color:var(--navy)">Kết nối HIS mới</div>
        <div style="font-size:11px;color:var(--g5)">Không yêu cầu thay đổi HIS hiện tại</div>
      </div>
      <button onclick="closeModal()" style="background:none;border:none;font-size:22px;color:var(--g5);cursor:pointer">×</button>
    </div>
    <div class="step-wrap" id="step-wrap"></div>
    <div id="step-content"></div>
    <div style="display:flex;gap:8px;margin-top:20px;justify-content:flex-end" id="step-btns"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════
const HIS_DATA = [
  {id:"h1",name:"BV Vinmec Times City",vendor:"Medisoft 5.2",type:"SQL",status:"connected",patients:12400,dq:82,fhir:false,sync:"2 phút trước",loc:"Hà Nội",tier:1},
  {id:"h2",name:"BV Đa khoa FV",vendor:"Oracle Health Cerner",type:"FHIR",status:"connected",patients:8900,dq:96,fhir:true,sync:"30 giây trước",loc:"TPHCM",tier:1},
  {id:"h3",name:"BV Thu Cúc",vendor:"iSofH v3.1",type:"HL7v2",status:"connected",patients:6700,dq:74,fhir:false,sync:"8 phút trước",loc:"Hà Nội",tier:2},
  {id:"h4",name:"BV Huyện Đan Phượng",vendor:"Phần mềm tự viết",type:"CSV",status:"partial",patients:2100,dq:41,fhir:false,sync:"1 ngày trước",loc:"Hà Nội",tier:3},
  {id:"h5",name:"Phòng khám Medlatec",vendor:"CMC HIS 2.0",type:"REST",status:"pending",patients:0,dq:0,fhir:false,sync:"Chưa kết nối",loc:"Hà Nội",tier:2},
  {id:"h6",name:"BV Bạch Mai (pilot)",vendor:"VNPT-IT HIS",type:"HL7v2",status:"connected",patients:31000,dq:68,fhir:false,sync:"15 phút trước",loc:"Hà Nội",tier:1},
];

const PATIENTS = [
  {id:"PT-001",name:"Nguyễn Văn An",dob:"1965-03-15",cccd:"001065012345",sex:"Nam",src:["h1","h6"],cond:["ĐTĐ type II (E11)","THA (I10)"],meds:["Metformin 500mg × 2/ngày","Amlodipine 5mg × 1/ngày"],allergy:false,visit:"22/01/2024"},
  {id:"PT-002",name:"Trần Thị Bình",dob:"1978-07-22",cccd:"038078034567",sex:"Nữ",src:["h2","h3"],cond:["Viêm gan B mạn (B18.1)"],meds:["Tenofovir 300mg × 1/ngày"],allergy:true,visit:"18/01/2024"},
  {id:"PT-003",name:"Phạm Thị Dung",dob:"1955-04-30",cccd:"027055078901",sex:"Nữ",src:["h1","h3","h6"],cond:["COPD (J44.1)","THA (I10)","Suy tim (I50.0)"],meds:["Tiotropium inhaler","Bisoprolol 5mg","Furosemide 40mg"],allergy:true,visit:"20/01/2024"},
  {id:"PT-004",name:"Lê Minh Châu",dob:"1990-11-08",cccd:"079090056789",sex:"Nam",src:["h2"],cond:["Hen phế quản (J45.0)"],meds:["Salbutamol 100mcg inhaler","Budesonide 200mcg"],allergy:false,visit:"19/01/2024"},
];

const ADAPTER = {
  SQL:   {label:"SQL Connector",  col:"#7C3AED",desc:"Read-only DB"},
  FHIR:  {label:"FHIR Native",    col:"#0EA5E9",desc:"FHIR R4 passthrough"},
  HL7v2: {label:"HL7 v2 Listener",col:"#059669",desc:"MLLP port"},
  REST:  {label:"REST Adapter",   col:"#D97706",desc:"Custom API"},
  CSV:   {label:"File Watcher",   col:"#DC2626",desc:"CSV/Excel"},
};

const DQ_CRITERIA = [
  {label:"ICD-10-VN có mã hợp lệ",w:25},
  {label:"Ngày sinh + CCCD đầy đủ",w:20},
  {label:"Mã thuốc có ATC code",w:20},
  {label:"Encounter có timestamp",w:15},
  {label:"Kết quả XN có LOINC",w:10},
  {label:"Bác sĩ có mã hành nghề",w:10},
];

const FHIR_SAMPLES = {
  Patient:{resourceType:"Patient",id:"PT-001",meta:{lastUpdated:"2024-01-22T10:30:00+07:00",source:"HIS Bridge v0.1",tag:[{code:"his_001",display:"Vinmec Times City"}]},identifier:[{system:"https://healthv.vn/mpi",value:"PT-001"},{system:"https://id.gov.vn/cccd",value:"001065012345"}],name:[{use:"official",family:"Nguyễn",given:["Văn An"]}],birthDate:"1965-03-15",gender:"male",address:[{country:"VN",state:"Hà Nội"}]},
  Condition:{resourceType:"Bundle",type:"searchset",total:2,entry:[{resource:{resourceType:"Condition",id:"C001",subject:{reference:"Patient/PT-001"},code:{coding:[{system:"http://hl7.org/fhir/sid/icd-10",code:"E11",display:"Đái tháo đường type II"}]},recordedDate:"2022-05-10",clinicalStatus:{coding:[{code:"active"}]}}},{resource:{resourceType:"Condition",id:"C002",subject:{reference:"Patient/PT-001"},code:{coding:[{system:"http://hl7.org/fhir/sid/icd-10",code:"I10",display:"Tăng huyết áp nguyên phát"}]},recordedDate:"2021-03-15",clinicalStatus:{coding:[{code:"active"}]}}}]},
  MedicationRequest:{resourceType:"Bundle",type:"searchset",total:2,entry:[{resource:{resourceType:"MedicationRequest",id:"M001",status:"active",subject:{reference:"Patient/PT-001"},medicationCodeableConcept:{coding:[{system:"http://www.whocc.no/atc",code:"A10BA02",display:"Metformin"}]},dosageInstruction:[{text:"500mg × 2 lần/ngày sau ăn"}]}},{resource:{resourceType:"MedicationRequest",id:"M002",status:"active",subject:{reference:"Patient/PT-001"},medicationCodeableConcept:{coding:[{system:"http://www.whocc.no/atc",code:"C08CA01",display:"Amlodipine"}]},dosageInstruction:[{text:"5mg × 1 lần/ngày"}]}}]},
};

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let STATE = {tab:"dashboard",selectedHIS:null,selectedPT:null,connectStep:0,apiLoading:false,apiResult:null,connectData:{name:"",vendor:"medisoft",type:"SQL"}};

// ══════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════
function dqColor(s){return s>=80?"#059669":s>=60?"#D97706":s>=40?"#EA580C":"#DC2626"}
function statusColor(s){return s==="connected"?"#059669":s==="partial"?"#D97706":"#94A3B8"}
function ratingLabel(s){return s>=80?"✅ Sẵn sàng cho AI":s>=60?"⚠ Cần cải thiện":s>=40?"🔴 Chưa đạt":s>0?"⛔ Cần xem xét":"—"}
function badge(label,col){return `<span class="badge" style="color:${col};background:${col}18;border:1px solid ${col}40">${label}</span>`}
function progressBar(val,col,h=7){return `<div class="progress" style="height:${h}px"><div class="progress-fill" style="width:${Math.max(0,Math.min(100,val))}%;background:${col};height:${h}px"></div></div>`}
function getHIS(id){return HIS_DATA.find(h=>h.id===id)}

// ══════════════════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════════════════
const TABS=[
  {id:"dashboard",label:"📊 Dashboard"},
  {id:"his",label:"🏥 HIS Connections"},
  {id:"mpi",label:"👤 Patient MPI"},
  {id:"dq",label:"✅ Data Quality"},
  {id:"api",label:"⚡ API Gateway"},
  {id:"pricing",label:"💰 Pricing"},
];

function initTabs(){
  const row=document.getElementById('tabs-row');
  row.innerHTML=TABS.map(t=>`<button class="tab${STATE.tab===t.id?' active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('');
}
function switchTab(id){
  STATE.tab=id;
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>{t.classList.toggle('active',t.textContent.includes(TABS.find(x=>x.id===id).label.split(' ').slice(1).join(' ')))});
  initTabs();
  renderPane(id);
}

// ══════════════════════════════════════════════════════════
// RENDER PANES
// ══════════════════════════════════════════════════════════
function renderPane(id){
  const el=document.getElementById('pane-'+id);
  switch(id){
    case 'dashboard': el.innerHTML=renderDashboard(); break;
    case 'his':       el.innerHTML=renderHIS(); attachHISEvents(); break;
    case 'mpi':       el.innerHTML=renderMPI(); attachMPIEvents(); break;
    case 'dq':        el.innerHTML=renderDQ(); break;
    case 'api':       el.innerHTML=renderAPI(); break;
    case 'pricing':   el.innerHTML=renderPricing(); break;
  }
}

// ─── DASHBOARD ────────────────────────────────────────────
function renderDashboard(){
  const connected=HIS_DATA.filter(h=>h.status==="connected");
  const totalPts=connected.reduce((s,h)=>s+h.patients,0);
  const avgDQ=Math.round(connected.reduce((s,h)=>s+h.dq,0)/connected.length);
  return `
  <div class="fadein">
  <div style="margin-bottom:18px">
    <h2 style="font-size:20px;font-weight:800;color:var(--navy);margin-bottom:4px">HIS Bridge — Control Center</h2>
    <p style="font-size:12px;color:var(--g5)">Tổng quan liên thông hệ thống HIS · Demo data · HealthV MedTech Q1/2026</p>
  </div>

  <!-- Stats -->
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">HIS ĐÃ KẾT NỐI</div><div class="stat-val" style="color:var(--greenM)">${connected.length}</div><div class="stat-sub">/ ${HIS_DATA.length} tổng</div></div>
    <div class="stat-card"><div class="stat-label">PATIENT RECORDS</div><div class="stat-val" style="color:var(--navy)">${totalPts.toLocaleString()}</div><div class="stat-sub">đã FHIR hóa</div></div>
    <div class="stat-card"><div class="stat-label">AVG DQ SCORE</div><div class="stat-val" style="color:var(--goldM)">${avgDQ}%</div><div class="stat-sub">Data Quality</div></div>
    <div class="stat-card"><div class="stat-label">FHIR API CALLS</div><div class="stat-val" style="color:var(--purpM)">12,847</div><div class="stat-sub">hôm nay (demo)</div></div>
    <div class="stat-card"><div class="stat-label">TIẾT KIỆM</div><div class="stat-val" style="color:var(--coral)">~4 th</div><div class="stat-sub">integration/AI project</div></div>
  </div>

  <div class="g2" style="margin-bottom:16px">
    <!-- HIS list -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="card-title" style="margin-bottom:0">HIS Connections</div>
        <button class="btn-primary" style="padding:6px 14px;font-size:11px" onclick="openModal()">+ Kết nối HIS mới</button>
      </div>
      ${HIS_DATA.slice(0,4).map(h=>{
        const at=ADAPTER[h.type];
        return `<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #F1F5F9;cursor:pointer" onclick="switchTab('his')">
          <div class="status-dot" style="background:${statusColor(h.status)}"></div>
          <div style="flex:1">
            <div style="font-size:12px;font-weight:600">${h.name}</div>
            <div style="font-size:10px;color:var(--g5)">${h.vendor} · ${h.loc}</div>
          </div>
          ${badge(at.label,at.col)}
          <div style="min-width:90px">
            <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--g5);margin-bottom:2px"><span>DQ</span><span style="color:${dqColor(h.dq)};font-weight:700">${h.dq}%</span></div>
            ${progressBar(h.dq,dqColor(h.dq),6)}
          </div>
          <div style="font-size:10px;color:var(--g5);min-width:60px;text-align:right">${h.patients>0?h.patients.toLocaleString()+" pts":"—"}</div>
        </div>`;
      }).join('')}
      <div style="text-align:center;margin-top:10px"><button onclick="switchTab('his')" style="font-size:11px;color:var(--tealM);background:none;border:none;font-weight:600;cursor:pointer">Xem tất cả →</button></div>
    </div>

    <!-- Value + AI products -->
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="card" style="flex:1">
        <div class="card-title">Giá trị cầu nối</div>

      <div style="display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap">
        ${badge("200 OK","#059669")} ${badge("GET /fhir/r4/"+resource,"#0B2D5E")} ${badge("FHIR R4","#7C3AED")}
        ${badge("12ms","#059669")}
      </div>
      <pre>${JSON.stringify(data,null,2)}</pre>`;
  },900);
}

// CONNECT MODAL
// ══════════════════════════════════════════════════════════
const STEPS=["Thông tin HIS","Chọn Adapter","Kiểm tra kết nối","Hoàn tất"];
function openModal(){STATE.connectStep=0;STATE.connectData={name:"",vendor:"medisoft",type:"SQL"};renderModal();document.getElementById('connect-modal').style.display='flex';}
function closeModal(){document.getElementById('connect-modal').style.display='none';}

function renderModal(){
  // Steps
  document.getElementById('step-wrap').innerHTML=STEPS.map((s,i)=>`
    <div class="step-item">
      <div class="step-circle" style="background:${i<=STATE.connectStep?'var(--tealM)':'var(--g8)'};color:${i<=STATE.connectStep?'white':'var(--g5)'}">${i+1}</div>
      <div style="font-size:9px;color:${i<=STATE.connectStep?'var(--tealM)':'var(--g5)'};font-weight:${i===STATE.connectStep?700:400}">${s}</div>
    </div>`).join('');

  // Content
  const sc=STATE.connectStep;
  let content='';
  if(sc===0){
    content=`
      <div style="display:grid;gap:12px">
        <div><label>Tên bệnh viện / phòng khám</label>
          <input type="text" id="cn-name" value="${STATE.connectData.name}" placeholder="VD: BV Đa khoa Hòa Bình" oninput="STATE.connectData.name=this.value"></div>
        <div><label>Nhà cung cấp HIS</label>
          <select id="cn-vendor" onchange="STATE.connectData.vendor=this.value">
            ${[["medisoft","Medisoft"],["isofh","iSofH"],["vnpt","VNPT-IT HIS"],["oracle","Oracle Health (Cerner)"],["cmc","CMC HIS"],["custom","Phần mềm tự viết / Khác"]].map(([v,l])=>`<option value="${v}"${STATE.connectData.vendor===v?' selected':''}>${l}</option>`).join('')}
          </select></div>
        <div style="padding:10px 12px;background:var(--tealL);border-radius:8px;font-size:11px;color:var(--teal);border:1px solid var(--tealM)40">
          ✓ Adapter sẽ chỉ đọc (read-only) — không ghi vào HIS, không ảnh hưởng vận hành
        </div>
      </div>`;
  } else if(sc===1){
    content=`
      <div>
        <div style="font-size:12px;font-weight:600;color:var(--navy);margin-bottom:10px">Chọn loại Adapter phù hợp:</div>
        <div class="g2" style="gap:8px">
          ${Object.entries(ADAPTER).map(([k,at])=>`
            <div onclick="STATE.connectData.type='${k}';renderModal()" style="padding:10px 12px;border:2px solid ${STATE.connectData.type===k?at.col:'var(--g8)'};border-radius:8px;cursor:pointer;background:${STATE.connectData.type===k?at.col+'12':'white'};transition:all .15s">
              <div style="font-size:11px;font-weight:700;color:${at.col}">${at.label}</div>
              <div style="font-size:10px;color:var(--g5)">${at.desc}</div>
            </div>`).join('')}
        </div>
      </div>`;
  } else if(sc===2){
    content=`
      <div style="text-align:center;padding:20px 0">
        <div style="width:44px;height:44px;border:4px solid var(--g8);border-top-color:var(--tealM);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px"></div>
        <div style="font-size:14px;font-weight:700;color:var(--navy);margin-bottom:10px">Đang kiểm tra kết nối...</div>
        ${["✓ Ping thành công","✓ Read-only access OK","✓ Schema detected","✓ ICD-10 mapping found"].map(s=>`<div style="font-size:11px;color:var(--greenM);margin-bottom:4px">${s}</div>`).join('')}
      </div>`;
  } else {
    content=`
      <div style="text-align:center;padding:20px 0">
        <div style="font-size:48px;margin-bottom:12px">🎉</div>
        <div style="font-size:16px;font-weight:800;color:var(--greenM);margin-bottom:6px">Kết nối thành công!</div>
        <div style="font-size:12px;color:var(--g3);margin-bottom:4px">${STATE.connectData.name||"HIS mới"} đã được thêm vào Bridge</div>
        <div style="font-size:11px;color:var(--g5)">Sync dữ liệu đầu tiên bắt đầu trong 15 phút</div>
      </div>`;
  }
  document.getElementById('step-content').innerHTML=content;

  // Buttons
  let btns='';
  if(sc>0&&sc<3) btns+=`<button onclick="prevStep()" style="padding:9px 20px;border:1.5px solid var(--g8);border-radius:8px;font-size:13px;background:white;color:var(--g3);cursor:pointer;font-family:inherit">← Quay lại</button>`;
  if(sc<3) btns+=`<button onclick="nextStep()" style="padding:9px 20px;background:var(--tealM);color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">${sc===2?"Xác nhận":"Tiếp tục →"}</button>`;
  if(sc===3) btns+=`<button onclick="closeModal()" style="padding:9px 22px;background:var(--navy);color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">Hoàn tất ✓</button>`;
  document.getElementById('step-btns').innerHTML=btns;
}

function nextStep(){
  if(STATE.connectStep===2){
    STATE.connectStep=3;renderModal();return;
  }
  STATE.connectStep=Math.min(STATE.connectStep+1,3);
  if(STATE.connectStep===2){renderModal();setTimeout(()=>{STATE.connectStep=3;renderModal();},2200);}
  else renderModal();
}
function prevStep(){STATE.connectStep=Math.max(STATE.connectStep-1,0);renderModal();}
